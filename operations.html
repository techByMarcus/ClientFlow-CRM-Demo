<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Operations & Logistics — ClientFlow Operations Suite</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --navy:#0F1C2E;--navy-mid:#162237;--navy-light:#1E3050;
    --blue:#2563EB;--blue-light:#3B82F6;--blue-pale:#EFF6FF;
    --teal:#0D9488;--teal-light:#14B8A6;--teal-pale:#F0FDFA;
    --gold:#F59E0B;--gold-pale:#FFFBEB;
    --red:#EF4444;--red-pale:#FEF2F2;
    --green:#10B981;--green-pale:#ECFDF5;
    --orange:#F97316;--orange-pale:#FFF7ED;
    --gray-50:#F8FAFC;--gray-100:#F1F5F9;--gray-200:#E2E8F0;
    --gray-300:#CBD5E1;--gray-400:#94A3B8;--gray-500:#64748B;
    --gray-600:#475569;--gray-700:#334155;--gray-800:#1E293B;
    --white:#FFFFFF;
    --sidebar-w:240px;
    --font:'DM Sans',sans-serif;
    --mono:'DM Mono',monospace;
    --radius:10px;--radius-lg:16px;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
    --shadow-md:0 4px 6px rgba(0,0,0,.07),0 10px 30px rgba(0,0,0,.1);
  }
  body{font-family:var(--font);background:var(--gray-50);color:var(--gray-800);line-height:1.5}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .fade-up{animation:fadeInUp .35s ease forwards}
  .fade-up-1{animation:fadeInUp .35s .05s ease both}
  .fade-up-2{animation:fadeInUp .35s .1s ease both}
  .fade-up-3{animation:fadeInUp .35s .15s ease both}
  .fade-up-4{animation:fadeInUp .35s .2s ease both}
  button{font-family:var(--font);cursor:pointer;border:none;outline:none}
  input,textarea,select{font-family:var(--font)}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:2px}

  /* LAYOUT */
  .app{display:flex;height:100vh;overflow:hidden}

  /* SIDEBAR */
  .sidebar{
    width:var(--sidebar-w);flex-shrink:0;
    background:linear-gradient(180deg,#0D1B2E 0%,#0F1C2E 60%,#0D2040 100%);
    display:flex;flex-direction:column;overflow:hidden;
    border-right:1px solid rgba(255,255,255,.04);
  }
  .sidebar-brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
  .brand-logo{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .brand-icon{
    width:36px;height:36px;
    background:linear-gradient(135deg,var(--blue),var(--teal));
    border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-size:18px;box-shadow:0 2px 8px rgba(37,99,235,.35);
  }
  .brand-name{font-size:16px;font-weight:700;color:var(--white);letter-spacing:-.3px}
  .brand-sub{font-size:11px;color:rgba(255,255,255,.4);font-weight:400}
  .sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
  .nav-section{margin-bottom:20px}
  .nav-label{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:1.2px;text-transform:uppercase;padding:0 8px;margin-bottom:6px}
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:9px 10px;
    border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:2px;
    color:rgba(255,255,255,.55);font-size:13.5px;font-weight:500;text-decoration:none;
  }
  .nav-item:hover{background:rgba(255,255,255,.07);color:var(--white)}
  .nav-item.active{background:var(--teal);color:var(--white);box-shadow:0 2px 8px rgba(13,148,136,.4)}
  .nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
  .sidebar-footer{padding:14px 10px;border-top:1px solid rgba(255,255,255,.08)}
  .suite-label{padding:8px 10px;font-size:10px;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:.5px}

  /* MAIN */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{
    background:var(--white);border-bottom:1px solid var(--gray-200);
    padding:0 24px;height:56px;display:flex;align-items:center;
    justify-content:space-between;flex-shrink:0;box-shadow:0 1px 0 var(--gray-200);
  }
  .topbar-left{display:flex;align-items:center;gap:12px}
  .page-title{font-size:17px;font-weight:700;color:var(--gray-800);letter-spacing:-.3px}
  .page-sub{font-size:12px;color:var(--gray-400);font-weight:400}
  .topbar-right{display:flex;align-items:center;gap:10px}
  .status-pill{
    display:inline-flex;align-items:center;gap:5px;padding:4px 10px;
    background:var(--teal-pale);border:1px solid #99F6E4;border-radius:20px;
    font-size:11px;font-weight:700;color:var(--teal);
  }
  .status-dot-pulse{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite}
  .topbar-divider{width:1px;height:20px;background:var(--gray-200);margin:0 4px}

  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;transition:all .15s;cursor:pointer;border:none}
  .btn-primary{background:var(--teal);color:white}
  .btn-primary:hover{background:var(--teal-light)}
  .btn-ghost{background:transparent;color:var(--gray-600);border:1px solid var(--gray-200)}
  .btn-ghost:hover{background:var(--gray-50)}
  .btn-sm{padding:5px 10px;font-size:12px}
  .btn-danger{background:var(--red-pale);color:var(--red);border:1px solid #fecaca}

  .content{flex:1;overflow-y:auto;padding:24px 28px}

  /* CARDS */
  .card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--gray-200);box-shadow:var(--shadow);transition:box-shadow .15s}
  .card-header{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between}
  .card-title{font-size:14px;font-weight:700;color:var(--gray-700)}
  .card-body{padding:16px 20px 20px}

  /* STAT CARDS */
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .stat-card{
    background:var(--white);border-radius:var(--radius-lg);
    border:1px solid var(--gray-200);padding:18px 20px;
    box-shadow:var(--shadow);position:relative;overflow:hidden;
    transition:transform .15s,box-shadow .15s;
  }
  .stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
  .stat-card.blue::before{background:var(--blue)}
  .stat-card.teal::before{background:var(--teal)}
  .stat-card.gold::before{background:var(--gold)}
  .stat-card.green::before{background:var(--green)}
  .stat-card.red::before{background:var(--red)}
  .stat-label{font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
  .stat-value{font-size:28px;font-weight:800;color:var(--gray-800);letter-spacing:-1.5px;line-height:1;font-family:var(--mono)}
  .stat-sub{font-size:12px;color:var(--gray-400);margin-top:6px}
  .stat-icon{font-size:20px;margin-bottom:8px}
  .stat-change{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;margin-top:6px}
  .stat-change.up{background:var(--green-pale);color:var(--green)}
  .stat-change.down{background:var(--red-pale);color:var(--red)}
  .stat-change.warn{background:var(--gold-pale);color:var(--gold)}

  /* TABLE */
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  thead th{
    padding:11px 14px;text-align:left;font-size:10.5px;font-weight:700;
    color:var(--gray-400);text-transform:uppercase;letter-spacing:1px;
    border-bottom:2px solid var(--gray-200);background:var(--gray-50);white-space:nowrap;
  }
  tbody td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--gray-100)}
  tbody tr{transition:background .1s;cursor:pointer}
  tbody tr:hover{background:var(--gray-50)}
  tbody tr:last-child td{border-bottom:none}
  .td-name{font-weight:600;color:var(--gray-800)}

  /* BADGES */
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
  .badge-blue{background:var(--blue-pale);color:var(--blue)}
  .badge-teal{background:var(--teal-pale);color:var(--teal)}
  .badge-green{background:var(--green-pale);color:var(--green)}
  .badge-gold{background:var(--gold-pale);color:var(--gold)}
  .badge-red{background:var(--red-pale);color:var(--red)}
  .badge-gray{background:var(--gray-100);color:var(--gray-500)}
  .badge-orange{background:var(--orange-pale);color:var(--orange)}
  .badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

  /* WELCOME BANNER */
  .welcome-banner{
    background:linear-gradient(135deg,#0D1B2E 0%,#0D4F47 50%,#0A6B5E 100%);
    border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:24px;
    display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 4px 20px rgba(13,148,136,.25);
  }
  .welcome-left h2{font-size:18px;font-weight:700;color:white;margin-bottom:4px;letter-spacing:-.3px}
  .welcome-left p{font-size:13px;color:rgba(255,255,255,.65);max-width:520px;line-height:1.5}
  .welcome-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .welcome-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;font-size:11px;font-weight:600;color:rgba(255,255,255,.85)}
  .welcome-right{text-align:right;flex-shrink:0;margin-left:24px}
  .welcome-right .big-stat{font-size:32px;font-weight:700;color:white;letter-spacing:-1.5px;line-height:1}
  .welcome-right .big-label{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px;font-weight:500}

  /* GRID */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  .mb-16{margin-bottom:16px}
  .mb-24{margin-bottom:24px}
  .mt-16{margin-top:16px}
  .ml-auto{margin-left:auto}
  .flex{display:flex}.items-center{align-items:center}.gap-8{gap:8px}.gap-12{gap:12px}
  .divider{height:1px;background:var(--gray-100);margin:16px 0}
  .section-title{font-size:15px;font-weight:700;color:var(--gray-800)}
  .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:var(--gray-100);color:var(--gray-500)}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
  .modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md)}
  .modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between}
  .modal-title{font-size:16px;font-weight:700;color:var(--gray-800)}
  .modal-close{background:var(--gray-100);border:none;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px}
  .modal-body{padding:20px 24px}
  .modal-footer{padding:16px 24px;border-top:1px solid var(--gray-200);display:flex;gap:10px;justify-content:flex-end}

  /* FORM */
  .form-group{margin-bottom:16px}
  .form-label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:6px}
  .form-input{width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px;color:var(--gray-700);transition:border .15s;background:var(--white)}
  .form-input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.1)}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-select{width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px;color:var(--gray-700);background:var(--white)}
  .form-select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.1)}
  .form-textarea{width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px;color:var(--gray-700);resize:vertical;min-height:80px}
  .form-textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.1)}

  /* DETAIL PANEL */
  .detail-header{
    background:linear-gradient(135deg,#0D1B2E 0%,#0D4F47 60%,#0A6B5E 100%);
    padding:28px;border-radius:var(--radius-lg) var(--radius-lg) 0 0;color:white;position:relative;overflow:hidden;
  }
  .detail-header::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none}
  .detail-name{font-size:20px;font-weight:700;margin-bottom:4px}
  .detail-meta{font-size:13px;opacity:.6}
  .detail-body{padding:20px}
  .info-row{display:flex;gap:8px;margin-bottom:10px;font-size:13px}
  .info-label{color:var(--gray-400);font-weight:500;width:130px;flex-shrink:0}
  .info-value{color:var(--gray-700);font-weight:500}
  .activity-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:12.5px}
  .activity-time{color:var(--gray-400);font-size:11px;margin-top:2px}

  /* ETA PROGRESS */
  .eta-bar{height:6px;background:var(--gray-100);border-radius:3px;overflow:hidden;margin:8px 0}
  .eta-fill{height:100%;border-radius:3px;transition:width .3s}

  /* EMPTY STATE */
  .empty-state{text-align:center;padding:48px 20px;color:var(--gray-400)}
  .empty-icon{font-size:40px;margin-bottom:12px}
  .empty-text{font-size:14px}

  /* NOTES CHIP */
  .notes-chip{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--gray-600);line-height:1.5}

  /* PIPELINE TOTAL */
  .summary-bar{background:var(--navy);color:white;border-radius:8px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;font-size:13px;font-weight:600}

  /* PORTFOLIO FOOTER */
  .portfolio-footer{position:fixed;bottom:0;right:0;padding:6px 14px;background:rgba(255,255,255,.95);border-top:1px solid var(--gray-200);border-left:1px solid var(--gray-200);border-radius:10px 0 0 0;font-size:11px;color:var(--gray-400);backdrop-filter:blur(8px)}
  .portfolio-footer a{color:var(--teal);font-weight:600;text-decoration:none}
  .portfolio-footer a:hover{text-decoration:underline}
</style>
</head>

<!-- ADD SHIPMENT MODAL -->
<div class="modal-overlay" id="addModal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add New Shipment</span>
      <button class="modal-close" id="closeModal">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Shipment ID</label><input class="form-input" id="f-id" placeholder="SHP-0012"/></div>
        <div class="form-group"><label class="form-label">Vendor / Carrier *</label><input class="form-input" id="f-vendor" placeholder="Apex Freight LLC"/></div>

        <div class="form-group"><label class="form-label">Origin</label><input class="form-input" id="f-origin" placeholder="Atlanta, GA"/></div>

      <button class="btn btn-ghost" id="cancelModal">Cancel</button>
      <button class="btn btn-primary" id="submitModal">Add Shipment</button>

</div>

let activeFilter = 'All';
let activeView = 'dashboard';

// ── HELPERS ───────────────────────────────────────────────────────────────────
function isDelayed(s) {
  if (s.status === 'Delivered') return false;
  return s.eta < TODAY;
}

function statusBadge(s, delayed) {
  if (delayed) return `<span class="badge badge-red"><span class="badge-dot"></span>Delayed</span>`;
  if (s === 'Delivered') return `<span class="badge badge-green"><span class="badge-dot"></span>Delivered</span>`;
  if (s === 'In Transit') return `<span class="badge badge-blue"><span class="badge-dot"></span>In Transit</span>`;
  return `<span class="badge badge-gray"><span class="badge-dot"></span>Pending</span>`;
}

function etaStatus(s) {
  if (s.status === 'Delivered') return `<span class="badge badge-green">✓ On Time</span>`;
  if (isDelayed(s)) return `<span class="badge badge-red">⚠ Delayed</span>`;
  const daysOut = Math.ceil((new Date(s.eta) - new Date(TODAY)) / 86400000);
  if (daysOut === 0) return `<span class="badge badge-gold">Due Today</span>`;
  if (daysOut === 1) return `<span class="badge badge-gold">Due Tomorrow</span>`;
  return `<span class="badge badge-teal">On Time</span>`;
}

function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function vendorInitials(v) {
  return v.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

// ── RENDER FUNCTIONS ──────────────────────────────────────────────────────────

        <div class="card-header"><span class="card-title">⚠️ Delayed & Issues</span></div>
        <div class="card-body">
          ${shipments.filter(s=>isDelayed(s)||s.issue).length === 0
            ? `<div class="empty-state" style="padding:20px"><div class="empty-icon">✅</div><div class="empty-text">No issues — all shipments on track</div></div>`

  const filtered = activeFilter === 'All' ? shipments : shipments.filter(s=>s.status===activeFilter);

    <tr onclick="openDetail('${s.id}')">
      <td>
        <div class="td-name">${s.id}</div>
        ${s.issue ? `<div style="font-size:10px;color:var(--red);font-weight:600">⚠ Issue flagged</div>` : ''}

      <td>
        <div style="display:flex;align-items:center;gap:8px">

          <div style="font-size:12.5px;font-weight:600;color:var(--gray-700)">${s.vendor}</div>

        <div style="font-size:11px;color:var(--gray-400);margin-top:3px">${s.weight} lbs</div>
      </td>
      <td style="font-size:12.5px;font-weight:600;color:var(--gray-700);font-family:var(--mono)">${formatDate(s.eta)}</td>
      <td>${statusBadge(s.status, isDelayed(s))}</td>
      <td>${etaStatus(s)}</td>
    </tr>
  `).join('');
}

function renderVendors() {
  document.getElementById('topbarSub').textContent = `${[...new Set(shipments.map(s=>s.vendor))].length} active vendors`;

    <div class="mb-24 fade-up">

                  <div style="font-size:11px;color:var(--gray-400);font-weight:600;text-transform:uppercase;letter-spacing:.6px">In Transit</div>
                </div>
                <div style="background:var(--gray-50);border-radius:8px;padding:12px;text-align:center">

function renderIssues() {

    <div class="fade-up">

        ? `<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">No issues — all shipments are running smoothly</div></div>`

            <span>🔴 ${flagged.length} Active Issue${flagged.length>1?'s':''} — Review and escalate as needed</span>

          </div>
          ${flagged.map(s=>`
            <div class="card mb-16" style="border-left:4px solid var(--red)">

        `}
    </div>
  `;
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
const views = {
  dashboard: { label: 'Operations & Logistics', render: renderDashboard },
  vendors:   { label: 'Vendor Tracking',         render: renderVendors },
  issues:    { label: 'Issues & Alerts',          render: renderIssues },
};

function setView(v) {
  activeView = v;
  document.getElementById('topbarTitle').textContent = views[v].label;
  document.getElementById('mainContent').innerHTML = views[v].render();
  document.querySelectorAll('.view-tab').forEach(btn=>{
    btn.className = `btn btn-sm view-tab ${btn.dataset.view === v ? 'btn-primary' : 'btn-ghost'}`;
  });
}

function setFilter(f) {
  activeFilter = f;
  const tbody = document.getElementById('shipmentTableBody');
  if (tbody) tbody.innerHTML = renderTableRows();
  // re-render to update button states
  document.getElementById('mainContent').innerHTML = views[activeView].render();
}

          ${delayed ? `<div class="activity-item">
            <div style="font-size:14px;flex-shrink:0;margin-top:1px">🔴</div>
            <div style="flex:1">
              <div style="color:var(--red);font-size:12.5px;font-weight:600">Delay flagged — ETA passed without delivery confirmation</div>
              <div class="activity-time">System · ${formatDate(TODAY)} · Auto-escalated</div>
            </div>
          </div>` : ''}
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid var(--gray-100)">
        ${s.issue || delayed ? `<button class="btn btn-danger btn-sm">🔔 Escalate to Manager</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="closeDetail()">Close</button>
        <button class="btn btn-primary btn-sm">✏️ Update Status</button>
      </div>
    </div>
  `;
  document.getElementById('detailModal').style.display = 'flex';
}

function closeDetail() {
  document.getElementById('detailModal').style.display = 'none';
}

// ── ADD SHIPMENT ──────────────────────────────────────────────────────────────
document.getElementById('addShipmentBtn').onclick = () => {
  document.getElementById('addModal').style.display = 'flex';
  // Set default ETA to a week from today
  document.getElementById('f-eta').value = '2026-04-20';
  document.getElementById('f-id').value = `SHP-${String(shipments.length + 1).padStart(4,'0')}`;
};
document.getElementById('closeModal').onclick = () => document.getElementById('addModal').style.display = 'none';
document.getElementById('cancelModal').onclick = () => document.getElementById('addModal').style.display = 'none';

document.getElementById('submitModal').onclick = () => {
  const vendor = document.getElementById('f-vendor').value.trim();
  if (!vendor) { alert('Vendor is required.'); return; }
  const newShip = {
    id: document.getElementById('f-id').value || `SHP-${String(shipments.length+1).padStart(4,'0')}`,
    vendor,
    origin: document.getElementById('f-origin').value || '—',
    dest: document.getElementById('f-dest').value || '—',
    status: document.getElementById('f-status').value,
    eta: document.getElementById('f-eta').value || '2026-04-20',
    cargo: document.getElementById('f-cargo').value || 'General Cargo',
    weight: document.getElementById('f-weight').value || '0',
    dispatched: TODAY,
    contact: '—',
    notes: document.getElementById('f-notes').value || 'No notes.',
    issue: false,
  };
  shipments.unshift(newShip);
  document.getElementById('addModal').style.display = 'none';
  setView(activeView);
};

// Click outside modal to close
document.getElementById('addModal').onclick = e => { if (e.target === e.currentTarget) e.currentTarget.style.display='none'; };
document.getElementById('detailModal').onclick = e => { if (e.target === e.currentTarget) closeDetail(); };

// ── FILTER BTN ────────────────────────────────────────────────────────────────
document.getElementById('filterBtn').onclick = () => {
  const opts = ['All', 'In Transit', 'Pending', 'Delivered'];
  const next = opts[(opts.indexOf(activeFilter)+1) % opts.length];
  setFilter(next);
};

// ── INIT ──────────────────────────────────────────────────────────────────────
// Inject view tabs into topbar area dynamically
const topbarLeft = document.querySelector('.topbar-left');
const tabsDiv = document.createElement('div');
tabsDiv.style.cssText = 'display:flex;gap:6px;margin-left:20px';
tabsDiv.innerHTML = [
  {id:'dashboard',label:'📊 Overview'},
  {id:'vendors',label:'🏢 Vendors'},
  {id:'issues',label:'🔴 Issues'},
].map(t=>`<button class="btn btn-sm view-tab ${t.id==='dashboard'?'btn-primary':'btn-ghost'}" data-view="${t.id}" onclick="setView('${t.id}')">${t.label}</button>`).join('');
topbarLeft.appendChild(tabsDiv);

setView('dashboard');
</script>
</body>
</html>
