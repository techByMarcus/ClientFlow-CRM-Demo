<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ClientFlow CRM Demo — Client Onboarding & Workflow Platform | Built by Marcus Albright</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<meta name="description" content="LoanFlow CRM — A professional mortgage pipeline management system built by Marcus Albright demonstrating CRM design, workflow automation, and client onboarding expertise."/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --navy:#0F1C2E;--navy-mid:#162237;--navy-light:#1E3050;
    --blue:#2563EB;--blue-light:#3B82F6;--blue-pale:#EFF6FF;
    --teal:#0D9488;--teal-light:#14B8A6;--teal-pale:#F0FDFA;
    --gold:#F59E0B;--gold-pale:#FFFBEB;
    --red:#EF4444;--red-pale:#FEF2F2;
    --green:#10B981;--green-pale:#ECFDF5;
    --gray-50:#F8FAFC;--gray-100:#F1F5F9;--gray-200:#E2E8F0;
    --gray-300:#CBD5E1;--gray-400:#94A3B8;--gray-500:#64748B;
    --gray-600:#475569;--gray-700:#334155;--gray-800:#1E293B;
    --white:#FFFFFF;
    --sidebar-w:240px;
    --font:'DM Sans',sans-serif;
    --mono:'DM Mono',monospace;
    --radius:10px;--radius-lg:16px;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
    --shadow-md:0 4px 6px rgba(0,0,0,.07),0 10px 30px rgba(0,0,0,.1);
  }
  body{font-family:var(--font);background:var(--gray-50);color:var(--gray-800);line-height:1.5}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  .fade-in{animation:fadeIn .4s ease forwards}
  .fade-up{animation:fadeInUp .35s ease forwards}
  .fade-up-1{animation:fadeInUp .35s .05s ease both}
  .fade-up-2{animation:fadeInUp .35s .1s ease both}
  .fade-up-3{animation:fadeInUp .35s .15s ease both}
  .fade-up-4{animation:fadeInUp .35s .2s ease both}
  button{font-family:var(--font);cursor:pointer;border:none;outline:none}
  input,textarea,select{font-family:var(--font)}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:2px}

  /* LAYOUT */
  .app{display:flex;height:100vh;overflow:hidden}

  /* SIDEBAR */
  .sidebar{
    width:var(--sidebar-w);flex-shrink:0;
    background:linear-gradient(180deg,#0D1B2E 0%,#0F1C2E 60%,#0D2040 100%);
    display:flex;flex-direction:column;overflow:hidden;
    border-right:1px solid rgba(255,255,255,.04);
  }
  .sidebar-brand{
    padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08);
  }
  .brand-logo{
    display:flex;align-items:center;gap:10px;margin-bottom:4px;
  }
  .brand-icon{
    width:36px;height:36px;
    background:linear-gradient(135deg,var(--blue),var(--teal));
    border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-size:18px;box-shadow:0 2px 8px rgba(37,99,235,.35);
  }
  .brand-name{font-size:16px;font-weight:700;color:var(--white);letter-spacing:-.3px}
  .brand-sub{font-size:11px;color:rgba(255,255,255,.4);font-weight:400}
  .sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
  .nav-section{margin-bottom:20px}
  .nav-label{
    font-size:9.5px;font-weight:600;color:rgba(255,255,255,.3);
    letter-spacing:1.2px;text-transform:uppercase;padding:0 8px;margin-bottom:6px;
  }
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:9px 10px;
    border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:2px;
    color:rgba(255,255,255,.55);font-size:13.5px;font-weight:500;
  }
  .nav-item:hover{background:rgba(255,255,255,.07);color:var(--white)}
  .nav-item.active{background:var(--blue);color:var(--white);box-shadow:0 2px 8px rgba(37,99,235,.4)}
  .nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
  .nav-badge{
    margin-left:auto;background:var(--red);color:white;
    font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;
  }
  .sidebar-footer{
    padding:14px 10px;border-top:1px solid rgba(255,255,255,.08);
  }
  .user-card{
    display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;
    background:rgba(255,255,255,.05);
  }
  .user-avatar{
    width:32px;height:32px;border-radius:50%;background:var(--teal);
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;color:white;flex-shrink:0;
  }
  .user-name{font-size:12.5px;font-weight:600;color:var(--white)}
  .user-nmls{font-size:10px;color:rgba(255,255,255,.4)}

  /* MAIN */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{
    background:var(--white);border-bottom:1px solid var(--gray-200);
    padding:0 24px;height:56px;display:flex;align-items:center;
    justify-content:space-between;flex-shrink:0;
  }
  .topbar-left{display:flex;align-items:center;gap:12px}
  .page-title{font-size:17px;font-weight:700;color:var(--gray-800);letter-spacing:-.3px}
  .page-sub{font-size:12px;color:var(--gray-400);font-weight:400}
  .topbar-right{display:flex;align-items:center;gap:10px}
  .status-pill{
    display:inline-flex;align-items:center;gap:5px;padding:4px 10px;
    background:var(--green-pale);border:1px solid #A7F3D0;border-radius:20px;
    font-size:11px;font-weight:700;color:var(--green);
  }
  .status-dot-pulse{
    width:6px;height:6px;border-radius:50%;background:var(--green);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .topbar-divider{width:1px;height:20px;background:var(--gray-200);margin:0 4px}
  .search-box{
    display:flex;align-items:center;gap:8px;background:var(--gray-50);
    border:1px solid var(--gray-200);border-radius:8px;padding:6px 12px;
    font-size:13px;color:var(--gray-400);width:200px;
  }
  .btn{
    display:inline-flex;align-items:center;gap:6px;padding:7px 14px;
    border-radius:8px;font-size:13px;font-weight:600;transition:all .15s;
  }
  .btn-primary{background:var(--blue);color:white}
  .btn-primary:hover{background:var(--blue-light)}
  .btn-ghost{background:transparent;color:var(--gray-600);border:1px solid var(--gray-200)}
  .btn-ghost:hover{background:var(--gray-50)}
  .btn-sm{padding:5px 10px;font-size:12px}
  .btn-danger{background:var(--red-pale);color:var(--red)}

  .content{flex:1;overflow-y:auto;padding:24px 28px}

  /* CARDS */
  .card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--gray-200);box-shadow:0 1px 3px rgba(0,0,0,.06),0 6px 20px rgba(0,0,0,.04)}
  .card-header{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between}
  .card-title{font-size:14px;font-weight:700;color:var(--gray-700)}
  .card-body{padding:16px 20px 20px}

  /* STAT CARDS */
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .stat-card{
    background:var(--white);border-radius:var(--radius-lg);
    border:1px solid var(--gray-200);padding:18px 20px;
    box-shadow:var(--shadow);position:relative;overflow:hidden;
  }
  .stat-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
  }
  .stat-card.blue::before{background:var(--blue)}
  .stat-card.teal::before{background:var(--teal)}
  .stat-card.gold::before{background:var(--gold)}
  .stat-card.green::before{background:var(--green)}
  .stat-label{font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
  .stat-value{font-size:28px;font-weight:800;color:var(--gray-800);letter-spacing:-1.5px;line-height:1;font-family:var(--mono)}
  .stat-sub{font-size:12px;color:var(--gray-400);margin-top:6px}
  .stat-change{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;margin-top:6px}
  .stat-change.up{background:var(--green-pale);color:var(--green)}
  .stat-change.down{background:var(--red-pale);color:var(--red)}

  /* PIPELINE KANBAN */
  .kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
  .kanban-col{
    flex-shrink:0;width:200px;background:var(--gray-50);
    border-radius:var(--radius);border:1px solid var(--gray-200);
  }
  .kanban-col-header{
    padding:10px 12px;border-bottom:1px solid var(--gray-200);
    display:flex;align-items:center;justify-content:space-between;
  }
  .kanban-col-title{font-size:12px;font-weight:700;color:var(--gray-600)}
  .kanban-count{
    font-size:10px;font-weight:700;background:var(--gray-200);
    color:var(--gray-500);padding:1px 6px;border-radius:10px;
  }
  .kanban-cards{padding:8px;display:flex;flex-direction:column;gap:8px;min-height:80px}
  .kanban-card{
    background:var(--white);border-radius:8px;border:1px solid var(--gray-200);
    padding:10px 12px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);
  }
  .kanban-card:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(37,99,235,.15);transform:translateY(-1px)}
  .kanban-card.stale{border-left:3px solid var(--red)}
  .kanban-card.warning{border-left:3px solid var(--gold)}
  .kc-name{font-size:12.5px;font-weight:600;color:var(--gray-800);margin-bottom:4px}
  .kc-amount{font-size:11px;font-weight:700;color:var(--blue);font-family:var(--mono)}
  .kc-type{font-size:10px;color:var(--gray-400);margin-bottom:6px}
  .kc-days{font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;display:inline-block}
  .kc-days.ok{background:var(--green-pale);color:var(--green)}
  .kc-days.warn{background:var(--gold-pale);color:var(--gold)}
  .kc-days.late{background:var(--red-pale);color:var(--red)}

  /* TABLE */
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  thead th{
    padding:11px 14px;text-align:left;font-size:10.5px;font-weight:700;
    color:var(--gray-400);text-transform:uppercase;letter-spacing:1px;
    border-bottom:2px solid var(--gray-200);background:var(--gray-50);
    white-space:nowrap;
  }
  tbody td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--gray-100)}
  tbody tr:hover{background:var(--gray-50)}
  tbody tr:last-child td{border-bottom:none}
  .td-name{font-weight:600;color:var(--gray-800)}
  .td-amount{font-family:var(--mono);font-weight:600;color:var(--blue)}

  /* BADGES */
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
  .badge-blue{background:var(--blue-pale);color:var(--blue)}
  .badge-teal{background:var(--teal-pale);color:var(--teal)}
  .badge-green{background:var(--green-pale);color:var(--green)}
  .badge-gold{background:var(--gold-pale);color:var(--gold)}
  .badge-red{background:var(--red-pale);color:var(--red)}
  .badge-gray{background:var(--gray-100);color:var(--gray-500)}
  .badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

  /* AUTOMATION */
  .auto-card{
    background:var(--white);border:1px solid var(--gray-200);
    border-radius:var(--radius);padding:16px;margin-bottom:12px;
    box-shadow:var(--shadow);
  }
  .auto-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .auto-title{font-size:13.5px;font-weight:700;color:var(--gray-800)}
  .auto-run{font-size:11px;color:var(--gray-400)}
  .auto-flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .auto-box{
    flex:1;min-width:120px;background:var(--white);border:1px solid var(--gray-200);
    border-radius:8px;padding:10px 12px;box-shadow:0 1px 3px rgba(0,0,0,.04);
    transition:border-color .15s;
  }
  .auto-box:hover{border-color:var(--blue-light)}
  .auto-box.trigger-box{border-top:2px solid var(--blue)}
  .auto-box.condition-box{border-top:2px solid var(--gold)}
  .auto-box.action-box{border-top:2px solid var(--teal)}
  .auto-box-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .auto-box-label.trigger{color:var(--blue)}
  .auto-box-label.condition{color:var(--gold)}
  .auto-box-label.action{color:var(--teal)}
  .auto-box-text{font-size:12px;color:var(--gray-600)}
  .auto-arrow{color:var(--gray-300);font-size:18px;flex-shrink:0}
  .toggle{
    position:relative;width:40px;height:22px;background:var(--gray-200);
    border-radius:11px;cursor:pointer;transition:background .2s;flex-shrink:0;
  }
  .toggle.on{background:var(--green)}
  .toggle::after{
    content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;
    background:white;border-radius:50%;transition:left .2s;
    box-shadow:0 1px 3px rgba(0,0,0,.2);
  }
  .toggle.on::after{left:21px}

  /* TASKS */
  .task-item{
    display:flex;align-items:flex-start;gap:12px;padding:12px 0;
    border-bottom:1px solid var(--gray-100);
  }
  .task-item:last-child{border-bottom:none}
  .task-check{
    width:18px;height:18px;border-radius:50%;border:2px solid var(--gray-300);
    flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;
    justify-content:center;transition:all .15s;
  }
  .task-check.done{background:var(--green);border-color:var(--green);color:white;font-size:10px}
  .task-check:hover:not(.done){border-color:var(--blue)}
  .task-name{font-size:13px;font-weight:500;color:var(--gray-700)}
  .task-name.done{text-decoration:line-through;color:var(--gray-400)}
  .task-meta{font-size:11px;color:var(--gray-400);margin-top:2px}
  .task-meta.overdue{color:var(--red);font-weight:600}

  /* ONBOARDING */
  .onboard-step{
    display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--gray-100);
  }
  .onboard-step:last-child{border-bottom:none}
  .step-num{
    width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px;
  }
  .step-num.complete{background:var(--green);color:white}
  .step-num.active{background:var(--blue);color:white}
  .step-num.pending{background:var(--gray-100);color:var(--gray-400)}
  .step-title{font-size:13.5px;font-weight:600;color:var(--gray-800);margin-bottom:3px}
  .step-desc{font-size:12px;color:var(--gray-400)}
  .step-status{margin-left:auto;flex-shrink:0}

  /* PROGRESS */
  .progress-bar{height:6px;background:var(--gray-100);border-radius:3px;overflow:hidden;margin:8px 0}
  .progress-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .3s}

  /* GRID LAYOUTS */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  .col-span-2{grid-column:span 2}

  /* DETAIL PANEL */
  .detail-header{
    background:linear-gradient(135deg,#0D1B2E 0%,#1E3A5F 50%,#0D4F47 100%);
    padding:28px;border-radius:var(--radius-lg) var(--radius-lg) 0 0;color:white;
    position:relative;overflow:hidden;
  }
  .detail-header::before{
    content:'';position:absolute;top:-40px;right:-40px;
    width:180px;height:180px;border-radius:50%;
    background:rgba(255,255,255,.04);pointer-events:none;
  }
  .detail-name{font-size:20px;font-weight:700;margin-bottom:4px}
  .detail-meta{font-size:13px;opacity:.6}
  .detail-body{padding:20px}
  .info-row{display:flex;gap:8px;margin-bottom:10px;font-size:13px}
  .info-label{color:var(--gray-400);font-weight:500;width:130px;flex-shrink:0}
  .info-value{color:var(--gray-700);font-weight:500}
  .activity-item{
    display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100);
    font-size:12.5px;
  }
  .activity-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:4px}
  .activity-time{color:var(--gray-400);font-size:11px;margin-top:2px}

  /* MODAL */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;
    align-items:center;justify-content:center;z-index:1000;padding:20px;
  }
  .modal{
    background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:520px;
    max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md);
  }
  .modal-header{
    padding:20px 24px 16px;border-bottom:1px solid var(--gray-200);
    display:flex;align-items:center;justify-content:space-between;
  }
  .modal-title{font-size:16px;font-weight:700;color:var(--gray-800)}
  .modal-close{background:var(--gray-100);border:none;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px}
  .modal-body{padding:20px 24px}
  .modal-footer{padding:16px 24px;border-top:1px solid var(--gray-200);display:flex;gap:10px;justify-content:flex-end}

  /* FORM */
  .form-group{margin-bottom:16px}
  .form-label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:6px}
  .form-input{
    width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:8px;
    font-size:13px;color:var(--gray-700);transition:border .15s;background:var(--white);
  }
  .form-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-select{
    width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:8px;
    font-size:13px;color:var(--gray-700);background:var(--white);
  }
  .form-textarea{width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px;color:var(--gray-700);resize:vertical;min-height:80px}

  /* MISC */
  .empty-state{text-align:center;padding:40px 20px;color:var(--gray-400)}
  .empty-icon{font-size:36px;margin-bottom:12px}
  .empty-text{font-size:14px}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .section-title{font-size:15px;font-weight:700;color:var(--gray-800)}
  .divider{height:1px;background:var(--gray-100);margin:16px 0}
  .flex{display:flex}.items-center{align-items:center}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
  .ml-auto{margin-left:auto}.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mb-16{margin-bottom:16px}
  .text-sm{font-size:12px}.text-xs{font-size:11px}.text-gray{color:var(--gray-400)}.fw-600{font-weight:600}
  .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:var(--gray-100);color:var(--gray-500)}

  /* WELCOME BANNER */
  .welcome-banner{
    background:linear-gradient(135deg,#0D1B2E 0%,#1A3A6B 40%,#0D5F57 80%,#0A7A6E 100%);
    border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:24px;
    display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 4px 20px rgba(15,28,46,.25);
  }
  .welcome-left h2{font-size:18px;font-weight:700;color:white;margin-bottom:4px;letter-spacing:-.3px}
  .welcome-left p{font-size:13px;color:rgba(255,255,255,.65);max-width:520px;line-height:1.5}
  .welcome-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .welcome-badge{
    display:inline-flex;align-items:center;gap:5px;padding:4px 10px;
    background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
    border-radius:20px;font-size:11px;font-weight:600;color:rgba(255,255,255,.85);
  }

function Tasks({tasks, setTasks, contacts}) {
  const [filter, setFilter] = useState('All');
  const toggle = id => setTasks(prev=>prev.map(t=>t.id===id?{...t,done:!t.done}:t));
  const filtered = tasks.filter(t=>{
    if(filter==='Active') return !t.done;
    if(filter==='Done') return t.done;
    if(filter==='Overdue') return !t.done && t.due<'2026-04-11';
    return true;
  });
  const getContactName = id => (contacts.find(c=>c.id===id)||{}).name||'—';
  return (
    <div>
      <div className="flex items-center gap-8 mb-16">
        {['All','Active','Overdue','Done'].map(f=>(
          <button key={f} className={`btn ${filter===f?'btn-primary':'btn-ghost'} btn-sm`} onClick={()=>setFilter(f)}>{f}</button>
        ))}
        <span style={{marginLeft:'auto',fontSize:12,color:'var(--gray-400)'}}>
          {tasks.filter(t=>!t.done).length} open · {tasks.filter(t=>t.done).length} completed
        </span>
      </div>
      <div className="card">
        <div className="card-body">
          {filtered.length===0?<div className="empty-state"><div className="empty-icon">✅</div><div className="empty-text">No tasks here</div></div>:
          filtered.map(t=>(
            <div key={t.id} className="task-item">
              <div className={`task-check ${t.done?'done':''}`} onClick={()=>toggle(t.id)}>{t.done?'✓':''}</div>
              <div style={{flex:1}}>
                <div className={`task-name ${t.done?'done':''}`}>{t.title}</div>
                <div className={`task-meta ${t.due<'2026-04-11'&&!t.done?'overdue':''}`}>
                  {t.category} · {getContactName(t.contactId)} · Due {t.due}
                </div>
              </div>
              {priorityBadge(t.priority)}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Credit Score Range</label><select className="form-select" value={form.creditScore} onChange={e=>set('creditScore',e.target.value)}>{['580-619','620-639','640-659','660-679','680-699','700-719','720-739','740-759','760-779','780-799','800+'].map(s=><option key={s}>{s}</option>)}</select></div>
            <div className="form-group"><label className="form-label">Annual Income</label><input className="form-input" value={form.income} onChange={e=>set('income',e.target.value)} placeholder="$95,000"/></div>
          </div>
          <div className="form-group"><label className="form-label">Notes</label><textarea className="form-textarea" value={form.notes} onChange={e=>set('notes',e.target.value)} placeholder="Initial notes about this borrower..."/></div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={submit}>Add Contact</button>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('dashboard');
  const [selectedContact, setSelectedContact] = useState(null);
  const [contacts, setContacts] = useState(INITIAL_CONTACTS);
  const [tasks, setTasks] = useState(INITIAL_TASKS);
  const [automations, setAutomations] = useState(INITIAL_AUTOMATIONS);
  const [showAddModal, setShowAddModal] = useState(false);

  const navItems = [
    {id:'dashboard',icon:'📊',label:'Dashboard'},
    {id:'pipeline',icon:'🗂',label:'Pipeline'},
    {id:'contacts',icon:'👥',label:'Contacts'},
    {id:'tasks',icon:'✅',label:'Tasks',badge:tasks.filter(t=>!t.done&&t.due<='2026-04-11').length||null},
    {id:'automations',icon:'⚡',label:'Automations'},
    {id:'templates',icon:'📧',label:'Templates'},
    {id:'reports',icon:'📈',label:'Reports'},
    {id:'auditlog',icon:'🔒',label:'Audit Log'},
  ];

  const pageTitles = {dashboard:'Dashboard',pipeline:'Pipeline View',contacts:'All Contacts',tasks:'Task Manager',automations:'Automation Center',templates:'Email Templates',reports:'Reports & Analytics',detail:'Borrower Detail',auditlog:'System Audit Log'};

  const handleView = (v, contact=null) => {setView(v); if(contact) setSelectedContact(contact)};

  const addContact = c => setContacts(prev=>[c,...prev]);

  return (
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-brand">
          <div className="brand-logo">
            <div className="brand-icon">🏠</div>
            <div>
              <div className="brand-name">LoanFlow CRM</div>
            </div>
          </div>
          <div className="brand-sub">Mortgage Pipeline Management</div>
        </div>
        <div className="sidebar-nav">
          <div className="nav-section">
            <div className="nav-label">Main</div>
            {navItems.map(item=>(
              <div key={item.id} className={`nav-item ${view===item.id?'active':''}`} onClick={()=>setView(item.id)}>
                <span className="nav-icon">{item.icon}</span>
                <span>{item.label}</span>
                {item.badge?<span className="nav-badge">{item.badge}</span>:null}
              </div>
            ))}
          </div>
        </div>
        <div className="sidebar-footer">
          <div className="user-card">
            <div className="user-avatar">MA</div>
            <div>
              <div className="user-name">Marcus Albright</div>
              <div className="user-nmls">NMLS #1503465</div>
            </div>
          </div>
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div className="topbar-left">
            <div>
              <div className="page-title">{pageTitles[view]||'LoanFlow CRM'}</div>
              <div className="page-sub">
                {view==='dashboard'&&`${contacts.filter(c=>c.stage!=='Funded').length} active loans · ${contacts.filter(c=>c.stage==='Funded').length} funded`}
                {view==='pipeline'&&`${contacts.length} total borrowers across ${STAGES.length} stages`}
                {view==='contacts'&&`${contacts.length} contacts`}
                {view==='tasks'&&`${tasks.filter(t=>!t.done).length} open tasks`}
                {view==='automations'&&`${automations.filter(a=>a.on).length} automations active`}
                {view==='auditlog'&&'Full system event log — all actions timestamped and categorized'}
              </div>
            </div>
          </div>
          <div className="topbar-right">
            <div className="status-pill">
              <div className="status-dot-pulse"/>
              Live Demo
            </div>
            <div className="topbar-divider"/>
            {view==='contacts'&&<button className="btn btn-primary btn-sm" onClick={()=>setShowAddModal(true)}>+ Add Contact</button>}
            {view==='pipeline'&&<button className="btn btn-ghost btn-sm">🔍 Filter</button>}
          </div>
        </div>

        <div className="content">
          {view==='dashboard' && <Dashboard contacts={contacts} tasks={tasks} onView={handleView}/>}
          {view==='pipeline' && <Pipeline contacts={contacts} onView={handleView}/>}
          {view==='contacts' && <Contacts contacts={contacts} onView={handleView} onAdd={()=>setShowAddModal(true)}/>}
          {view==='tasks' && <Tasks tasks={tasks} setTasks={setTasks} contacts={contacts}/>}
          {view==='automations' && <Automations automations={automations} setAutomations={setAutomations}/>}
          {view==='templates' && <Templates/>}
          {view==='reports' && <Reports contacts={contacts}/>}
          {view==='auditlog' && <AuditLog contacts={contacts} tasks={tasks}/>}
          {view==='detail' && selectedContact && <ContactDetail contact={selectedContact} onBack={()=>setView('contacts')} contacts={contacts} setContacts={setContacts} tasks={tasks}/>}
        </div>
      </div>

      {showAddModal && <AddContactModal onClose={()=>setShowAddModal(false)} onAdd={addContact}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

footerDiv.className = 'portfolio-footer';
footerDiv.innerHTML = 'Built by <a href="https://linkedin.com/in/marcus-a-69ab2989" target="_blank">Marcus Albright</a> &nbsp;·&nbsp; <a href="https://github.com/techByMarcus/mortgage-crm" target="_blank">View on GitHub</a> &nbsp;·&nbsp; NMLS #1503465';
document.body.appendChild(footerDiv);
</script>
</body>
</html>
